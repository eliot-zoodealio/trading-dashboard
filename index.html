<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eliot's Trading Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 24px; }
    h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 6px; color: #fff; }
    .subtitle { font-size: 0.85rem; color: #8b949e; margin-bottom: 20px; }
    .month-selector { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 28px; align-items: center; }
    .month-selector span { font-size: 0.8rem; color: #8b949e; margin-right: 4px; }
    .month-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid #30363d; background: #161b22; color: #8b949e; font-size: 0.82rem; cursor: pointer; transition: all 0.15s; font-weight: 500; }
    .month-btn:hover { border-color: #58a6ff; color: #58a6ff; }
    .month-btn.active { background: #1f3a5f; border-color: #58a6ff; color: #58a6ff; font-weight: 700; }
    .month-btn.year { background: #1a2d1a; border-color: #3fb950; color: #3fb950; }
    .month-btn.year.active { background: #1a3d1a; border-color: #3fb950; color: #3fb950; font-weight: 700; }
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .kpi { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 18px 20px; }
    .kpi-label { font-size: 0.75rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .kpi-value { font-size: 1.6rem; font-weight: 700; color: #fff; }
    .kpi-value.green { color: #3fb950; }
    .kpi-value.red { color: #f85149; }
    .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(420px, 1fr)); gap: 20px; margin-bottom: 32px; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 20px; }
    .card h2 { font-size: 0.9rem; font-weight: 600; color: #8b949e; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 16px; }
    .chart-wrap { position: relative; height: 260px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    thead th { text-align: left; padding: 8px 12px; color: #8b949e; font-weight: 600; border-bottom: 1px solid #30363d; font-size: 0.75rem; text-transform: uppercase; }
    tbody tr { border-bottom: 1px solid #21262d; transition: background 0.15s; }
    tbody tr:hover { background: #1c2128; }
    tbody td { padding: 10px 12px; color: #e6edf3; }
    .pos { color: #3fb950; font-weight: 600; }
    .neg { color: #f85149; font-weight: 600; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    .badge-stock { background: #1f3a5f; color: #79c0ff; }
    .badge-crypto { background: #3d2b00; color: #e3b341; }
    .badge-month { background: #21262d; color: #8b949e; }
    #status { font-size: 0.8rem; color: #8b949e; margin-bottom: 20px; }
    #status.error { color: #f85149; }
  </style>
</head>
<body>
  <h1>📈 Trading Dashboard</h1>
  <div class="subtitle">Robinhood trades — live from Google Sheets</div>
  <div id="status">Loading data...</div>
  <div class="month-selector" id="monthSelector"><span>View:</span></div>
  <div class="kpi-grid" id="kpis"></div>
    <div class="charts-grid">
    <div class="card"><h2>P&L by Trade</h2><div class="chart-wrap"><canvas id="plChart"></canvas></div></div>
    <div class="card"><h2>Return % by Asset</h2><div class="chart-wrap"><canvas id="returnChart"></canvas></div></div>
    <div class="card"><h2>Capital Deployed by Asset</h2><div class="chart-wrap"><canvas id="capitalChart"></canvas></div></div>
    <div class="card"><h2>Stocks vs Crypto Split</h2><div class="chart-wrap"><canvas id="splitChart"></canvas></div></div>
  </div>
  <div class="card">
    <h2>All Trades</h2>
    <table>
      <thead><tr><th>Date</th><th>Asset</th><th>Type</th><th id="monthCol" style="display:none">Month</th><th>Shares</th><th>Buy</th><th>Sell</th><th>Capital Out</th><th>Fees</th><th>Profit / Loss</th><th>Return %</th></tr></thead>
      <tbody id="tradeTable"></tbody>
    </table>
  </div>
  <script>
    const SHEET_ID = '1QZArOJS0a1l54F9TlhcXK5hRBD8JO4HhSeohYBYsvPw';
    const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const CRYPTO = new Set(['BTC','ETH','SOL','XRP','DOGE','ABTC','ADA','AVAX','MATIC','LTC','LINK']);
    let allData = {}, activeMonth = null, charts = {};

    function csvUrl(sheet) { return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheet)}`; }

    function parseCSV(text) {
      return text.trim().split('\n').map(row => {
        const cols = []; let cur = '', inQuote = false;
        for (let i = 0; i < row.length; i++) {
          const c = row[i];
          if (c === '"') { inQuote = !inQuote; }
          else if (c === ',' && !inQuote) { cols.push(cur.trim()); cur = ''; }
          else { cur += c; }
        }
        cols.push(cur.trim()); return cols;
      });
    }

    function parseMoney(s) { if (!s) return 0; return parseFloat(s.replace(/[$,%]/g, '').replace(/,/g, '')) || 0; }
    function fmt(n) { return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
    function fmtPct(n) { return n.toFixed(2) + '%'; }

    async function fetchMonth(month) {
      try {
        const res = await fetch(csvUrl(month));
        if (!res.ok) return null;
        const text = await res.text();
        const rows = parseCSV(text);
        const trades = rows.slice(1).filter(r => r[0] && r[1] && r[1].trim() !== '' && r[1] !== 'Asset');
        if (!trades.length) return null;
        return trades.map(r => ({ month, date: r[0], asset: r[1], shares: parseMoney(r[2]), buy: parseMoney(r[3]), sell: parseMoney(r[4]), fees: parseMoney(r[5]), moneyOut: parseMoney(r[6]), pl: parseMoney(r[7]), plPct: parseMoney(r[8]), type: CRYPTO.has(r[1]) ? 'Crypto' : 'Stock' }));
      } catch { return null; }
    }

    async function loadAllData() {
      const statusEl = document.getElementById('status');
      const results = await Promise.all(MONTHS.map(m => fetchMonth(m)));
      let found = [];
      results.forEach((trades, i) => { if (trades) { allData[MONTHS[i]] = trades; found.push(MONTHS[i]); } });
      if (!found.length) { statusEl.className = 'error'; statusEl.textContent = 'No data found. Make sure your Google Sheet is set to "Anyone with the link can view".'; return; }
      statusEl.textContent = `Last updated: ${new Date().toLocaleString()} · Months loaded: ${found.join(', ')}`;
      buildSelector(found);
      activeMonth = found[found.length - 1];
      render();
    }

    function buildSelector(months) {
      const el = document.getElementById('monthSelector');
      el.innerHTML = '<span>View:</span>';
      const yearBtn = document.createElement('button');
            yearBtn.className = 'month-btn year'; yearBtn.textContent = '📅 Full Year';
      yearBtn.onclick = () => { activeMonth = null; updateButtons(); render(); };
      el.appendChild(yearBtn);
      months.forEach(m => {
        const btn = document.createElement('button');
        btn.className = 'month-btn'; btn.textContent = m; btn.dataset.month = m;
        btn.onclick = () => { activeMonth = m; updateButtons(); render(); };
        el.appendChild(btn);
      });
      updateButtons();
    }

    function updateButtons() {
      document.querySelectorAll('.month-btn').forEach(btn => {
        if (btn.dataset.month) btn.classList.toggle('active', btn.dataset.month === activeMonth);
        else btn.classList.toggle('active', activeMonth === null);
      });
    }

    function getActiveData() { return activeMonth === null ? Object.values(allData).flat() : (allData[activeMonth] || []); }

    function render() {
      const data = getActiveData(), isYear = activeMonth === null;
      document.getElementById('monthCol').style.display = isYear ? '' : 'none';
      renderKPIs(data); renderTable(data, isYear); renderCharts(data);
    }

    function renderKPIs(data) {
      const totalCapital = data.reduce((s,t) => s+t.moneyOut, 0), totalPL = data.reduce((s,t) => s+t.pl, 0), totalFees = data.reduce((s,t) => s+t.fees, 0);
      const overallPct = totalCapital > 0 ? (totalPL/totalCapital)*100 : 0;
      const bestTrade = data.length ? data.reduce((a,b) => b.plPct > a.plPct ? b : a) : null;
      const kpis = [
        { label: 'Total Capital Deployed', value: fmt(totalCapital), cls: '' },
        { label: 'Total Profit / Loss', value: fmt(totalPL), cls: totalPL >= 0 ? 'green' : 'red' },
        { label: 'Overall Return', value: fmtPct(overallPct), cls: overallPct >= 0 ? 'green' : 'red' },
        { label: 'Total Fees', value: fmt(totalFees), cls: '' },
        { label: 'Number of Trades', value: data.length, cls: '' },
        { label: 'Best Trade', value: bestTrade ? `${bestTrade.asset} +${fmtPct(bestTrade.plPct)}` : '—', cls: 'green' },
      ];
      document.getElementById('kpis').innerHTML = kpis.map(k => `<div class="kpi"><div class="kpi-label">${k.label}</div><div class="kpi-value ${k.cls}">${k.value}</div></div>`).join('');
    }

    function renderTable(data, showMonth) {
      document.getElementById('tradeTable').innerHTML = data.map(t => `<tr><td>${t.date}</td><td><strong>${t.asset}</strong></td><td><span class="badge ${t.type==='Crypto'?'badge-crypto':'badge-stock'}">${t.type}</span></td>${showMonth?`<td><span class="badge badge-month">${t.month}</span></td>`:''}<td>${t.shares}</td><td>${fmt(t.buy)}</td><td>${fmt(t.sell)}</td><td>${fmt(t.moneyOut)}</td><td>${fmt(t.fees)}</td><td class="${t.pl>=0?'pos':'neg'}">${fmt(t.pl)}</td><td class="${t.plPct>=0?'pos':'neg'}">${fmtPct(t.plPct)}</td></tr>`).join('');
    }

    function destroyCharts() { Object.values(charts).forEach(c => c.destroy()); charts = {}; }

    function renderCharts(data) {
      destroyCharts();
      const colors = ['#58a6ff','#3fb950','#e3b341','#f85149','#bc8cff','#79c0ff','#56d364','#ffa657','#ff7b72','#d2a8ff'];
      charts.pl = new Chart(document.getElementById('plChart'), { type:'bar', data:{ labels:data.map(t=>`${t.asset} ${t.date}`), datasets:[{data:data.map(t=>t.pl), backgroundColor:data.map(t=>t.pl>=0?'#3fb950':'#f85149'), borderRadius:4}]}, options:{plugins:{legend:{display:false}}, scales:{x:{ticks:{color:'#8b949e',font:{size:10}},grid:{color:'#21262d'}},y:{ticks:{color:'#8b949e',callback:v=>'$'+v},grid:{color:'#21262d'}}}}});
      const assetMap={};
      data.forEach(t=>{if(!assetMap[t.asset])assetMap[t.asset]={total:0,count:0};assetMap[t.asset].total+=t.plPct;assetMap[t.asset].count++;});
      const assets=Object.keys(assetMap).sort((a,b)=>(assetMap[b].total/assetMap[b].count)-(assetMap[a].total/assetMap[a].count));
            const avgReturns=assets.map(a=>+(assetMap[a].total/assetMap[a].count).toFixed(2));
      charts.return = new Chart(document.getElementById('returnChart'), {type:'bar',data:{labels:assets,datasets:[{data:avgReturns,backgroundColor:avgReturns.map(v=>v>=0?'#58a6ff':'#f85149'),borderRadius:4}]},options:{plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#8b949e'},grid:{color:'#21262d'}},y:{ticks:{color:'#8b949e',callback:v=>v+'%'},grid:{color:'#21262d'}}}}});
      const capitalMap={};
      data.forEach(t=>{capitalMap[t.asset]=(capitalMap[t.asset]||0)+t.moneyOut;});
      const capAssets=Object.keys(capitalMap).sort((a,b)=>capitalMap[b]-capitalMap[a]);
      charts.capital = new Chart(document.getElementById('capitalChart'), {type:'bar',data:{labels:capAssets,datasets:[{data:capAssets.map(a=>capitalMap[a]),backgroundColor:colors,borderRadius:4}]},options:{plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#8b949e'},grid:{color:'#21262d'}},y:{ticks:{color:'#8b949e',callback:v=>'$'+v.toLocaleString()},grid:{color:'#21262d'}}}}});
      const stockCap=data.filter(t=>t.type==='Stock').reduce((s,t)=>s+t.moneyOut,0), cryptoCap=data.filter(t=>t.type==='Crypto').reduce((s,t)=>s+t.moneyOut,0);
      charts.split = new Chart(document.getElementById('splitChart'), {type:'doughnut',data:{labels:['Stocks','Crypto'],datasets:[{data:[stockCap,cryptoCap],backgroundColor:['#58a6ff','#e3b341'],borderWidth:0}]},options:{plugins:{legend:{labels:{color:'#e6edf3',font:{size:13}}},tooltip:{callbacks:{label:ctx=>` ${fmt(ctx.raw)}`}}}}});
    }

    loadAllData();
  </script>
</body>
</html>
