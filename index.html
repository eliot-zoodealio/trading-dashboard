<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eliot's Trading Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 24px;
    }
    h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 6px; color: #fff; }
    .subtitle { font-size: 0.85rem; color: #8b949e; margin-bottom: 28px; }
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .kpi { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 18px 20px; }
    .kpi-label { font-size: 0.75rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .kpi-value { font-size: 1.6rem; font-weight: 700; color: #fff; }
    .kpi-value.green { color: #3fb950; }
    .kpi-value.red { color: #f85149; }
    .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(420px, 1fr)); gap: 20px; margin-bottom: 32px; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 20px; }
    .card h2 { font-size: 0.9rem; font-weight: 600; color: #8b949e; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 16px; }
    .chart-wrap { position: relative; height: 260px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    thead th { text-align: left; padding: 8px 12px; color: #8b949e; font-weight: 600; border-bottom: 1px solid #30363d; font-size: 0.75rem; text-transform: uppercase; }
    tbody tr { border-bottom: 1px solid #21262d; transition: background 0.15s; }
    tbody tr:hover { background: #1c2128; }
    tbody td { padding: 10px 12px; color: #e6edf3; }
    .pos { color: #3fb950; font-weight: 600; }
    .neg { color: #f85149; font-weight: 600; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    .badge-stock { background: #1f3a5f; color: #79c0ff; }
    .badge-crypto { background: #3d2b00; color: #e3b341; }
    #status { font-size: 0.8rem; color: #8b949e; margin-bottom: 20px; }
    #status.error { color: #f85149; }
  </style>
</head>
<body>
  <h1>📈 Trading Dashboard</h1>
  <div class="subtitle">Robinhood trades — live from Google Sheets</div>
  <div id="status">Loading data...</div>
  <div class="kpi-grid" id="kpis"></div>
  <div class="charts-grid">
    <div class="card"><h2>P&L by Trade</h2><div class="chart-wrap"><canvas id="plChart"></canvas></div></div>
    <div class="card"><h2>Return % by Asset</h2><div class="chart-wrap"><canvas id="returnChart"></canvas></div></div>
    <div class="card"><h2>Capital Deployed by Asset</h2><div class="chart-wrap"><canvas id="capitalChart"></canvas></div></div>
    <div class="card"><h2>Stocks vs Crypto Split</h2><div class="chart-wrap"><canvas id="splitChart"></canvas></div></div>
  </div>
  <div class="card">
    <h2>All Trades</h2>
    <table>
